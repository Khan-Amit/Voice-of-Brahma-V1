<body>
    <div class="container">
        <header>

        <div class="card">
            <h2>🐧 Linux ↔ Ternary & Binary</h2>
            <div class="input-group">
                <label for="linuxInput">Enter shell command:</label>
                <input type="text" id="linuxInput" value='echo "Hello, World!"' />
            </div>
            <div class="btn-group">
                <button class="btn" id="btnToTernary">→ Ternary</button>
                <button class="btn" id="btnToBinary">→ Binary</button>
                <button class="btn btn-secondary" id="btnToText">← Shell</button>
            </div>
            <div class="output-box" id="outputBox">Click a button</div>
            <div class="error-box" id="errorBox"></div>
        </div>

        </div>

    <script src="engine.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function waitForEngine() {
                return new Promise((resolve) => {
                    const check = () => {
                        if (engine._loaded) { resolve(); }
                        else { setTimeout(check, 100); }
                    };
                    check();
                });
            }

            async function toTernary() {
                await waitForEngine();
                const input = document.getElementById('linuxInput').value;
                const output = document.getElementById('outputBox');
                const error = document.getElementById('errorBox');
                error.style.display = 'none';
                try {
                    const result = engine.textToTernary(input);
                    output.textContent = 'Ternary (5‑trit):\n' + engine.formatTernary(result);
                } catch(e) {
                    error.textContent = 'Error: ' + e.message;
                    error.style.display = 'block';
                }
            }

            async function toBinary() {
                await waitForEngine();
                const input = document.getElementById('linuxInput').value;
                const output = document.getElementById('outputBox');
                const error = document.getElementById('errorBox');
                error.style.display = 'none';
                try {
                    const result = engine.textToBinary(input);
                    output.textContent = 'Binary (8‑bit):\n' + engine.formatBinary(result);
                } catch(e) {
                    error.textContent = 'Error: ' + e.message;
                    error.style.display = 'block';
                }
            }

            async function toText() {
                await waitForEngine();
                const output = document.getElementById('outputBox');
                const error = document.getElementById('errorBox');
                error.style.display = 'none';
                try {
                    const raw = output.textContent.replace(/\s/g, '');
                    if (/^[012]+$/.test(raw)) {
                        document.getElementById('linuxInput').value = engine.ternaryToText(raw);
                    } else if (/^[01]+$/.test(raw)) {
                        document.getElementById('linuxInput').value = engine.binaryToText(raw);
                    } else {
                        error.textContent = 'Unknown format – use ternary (0,1,2) or binary (0,1)';
                        error.style.display = 'block';
                    }
                } catch(e) {
                    error.textContent = e.message;
                    error.style.display = 'block';
                }
            }

            document.getElementById('btnToTernary').addEventListener('click', toTernary);
            document.getElementById('btnToBinary').addEventListener('click', toBinary);
            document.getElementById('btnToText').addEventListener('click', toText);

            waitForEngine().then(() => {
                document.getElementById('outputBox').textContent = 'Engine loaded. Click a button.';
            });
        });
    </script>
</body>
