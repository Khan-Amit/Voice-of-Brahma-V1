<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Voice-of-Brahma-V1</title>
    <style>
        body { background: #0a0e14; color: #e0e6ed; font-family: monospace; padding: 2rem; max-width: 800px; margin: auto; }
        .card { background: #141a22; border: 1px solid #2a3340; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        input, button { background: #0a0e14; border: 1px solid #2a3340; color: white; padding: 0.5rem; font-family: monospace; }
        button { background: #2a6b40; cursor: pointer; margin-right: 0.5rem; }
        .output { background: #0a0e14; border: 1px solid #2a3340; padding: 0.5rem; margin-top: 0.5rem; white-space: pre-wrap; word-break: break-all; }
        .back { color: #5ecf82; text-decoration: none; display: inline-block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <h1 style="color:#5ecf82;">🗣️ Voice-of-Brahma-V1</h1>
    <p><span style="color:#5ecf82;">Data-driven</span> · No hardcode · All data from <code>data/</code> folder</p>

    <div class="card">
        <h2 style="color:#5ecf82;">📝 ASCII ↔ Ternary</h2>
        <label>Enter text:</label><br>
        <input type="text" id="input" value="Hello, World!" style="width:100%;">
        <div style="margin:0.5rem 0;">
            <button onclick="toTernary()">→ Ternary</button>
            <button onclick="toBinary()">→ Binary</button>
            <button onclick="toText()">← Text</button>
            <button onclick="showStatus()">📊 Status</button>
        </div>
        <div class="output" id="output">Click a button</div>
        <div id="error" style="color:#ff6b6b; display:none;"></div>
        <div id="status" style="color:#5ecf82; font-size:0.8rem; margin-top:0.5rem;"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        // Wait for engine to load
        function waitForEngine() {
            return new Promise((resolve) => {
                const check = () => {
                    if (engine._loaded) {
                        resolve();
                    } else {
                        setTimeout(check, 100);
                    }
                };
                check();
            });
        }

        async function toTernary() {
            await waitForEngine();
            const text = document.getElementById('input').value;
            const result = engine.textToTernary(text);
            document.getElementById('output').textContent = 'Ternary (5‑trit):\n' + engine.formatTernary(result);
        }

        async function toBinary() {
            await waitForEngine();
            const text = document.getElementById('input').value;
            const bin = engine.textToBinary(text);
            document.getElementById('output').textContent = 'Binary (8‑bit):\n' + engine.formatBinary(bin);
        }

        async function toText() {
            await waitForEngine();
            const raw = document.getElementById('output').textContent.replace(/\s/g, '');
            const err = document.getElementById('error');
            err.style.display = 'none';
            try {
                if (/^[012]+$/.test(raw)) {
                    document.getElementById('input').value = engine.ternaryToText(raw);
                } else if (/^[01]+$/.test(raw)) {
                    document.getElementById('input').value = engine.binaryToText(raw);
                } else {
                    err.textContent = 'Unknown format – use ternary (0,1,2) or binary (0,1)';
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = e.message;
                err.style.display = 'block';
            }
        }

        async function showStatus() {
            await waitForEngine();
            const energy = engine.getEnergyMatrix();
            const scale = engine.getScaleMatrix();
            const status = document.getElementById('status');
            status.innerHTML = `Energy matrix: ${Object.keys(energy).length} entries<br>` +
                              `Scale matrix: ${Object.keys(scale).length} entries<br>` +
                              `ASCII table: ${Object.keys(engine.asciiTable).length} characters<br>` +
                              `Engine: loaded ✅`;
        }

        // Auto-run on load
        window.onload = function() {
            waitForEngine().then(() => {
                document.getElementById('output').textContent = 'Engine loaded. Click a button.';
                showStatus();
            });
        };
    </script>
</body>
</html>
